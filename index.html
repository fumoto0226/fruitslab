<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Bento — React + drei (verbatim reference stack)</title>
  <style>
    html, body { margin: 0; height: 100%; overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    #root { width: 100vw; height: 100vh; }
    input[type=range] { height: 2px; background: #ddd; -webkit-appearance: none; appearance: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 12px; height: 12px; background: #111; border-radius: 50%; cursor: pointer;
    }
  </style>

  <!-- Import map — R3F / drei / csg all share one three + react version so peer deps resolve -->
  <script type="importmap">
  {
    "imports": {
      "react":              "https://esm.sh/react@19.2.7",
      "react/jsx-runtime":  "https://esm.sh/react@19.2.7/jsx-runtime",
      "react-dom":          "https://esm.sh/react-dom@19.2.7",
      "react-dom/client":   "https://esm.sh/react-dom@19.2.7/client",
      "three":              "https://esm.sh/three@0.169.0",
      "@react-three/fiber": "https://esm.sh/@react-three/fiber@9.6.1?deps=react@19.2.7,three@0.169.0&external=react,three",
      "@react-three/drei":  "https://esm.sh/@react-three/drei@10.7.7?deps=react@19.2.7,three@0.169.0,@react-three/fiber@9.6.1&external=react,three,@react-three/fiber",
      "@react-three/csg":   "https://esm.sh/@react-three/csg@4.0.0?deps=react@19.2.7,three@0.169.0,@react-three/fiber@9.6.1&external=react,three,@react-three/fiber",
      "three-stdlib":       "https://esm.sh/three-stdlib@2.35.0?deps=three@0.169.0&external=three"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>

  <!-- error surface so we can see cross-origin script errors -->
  <pre id="err" style="position:fixed;top:10px;left:10px;right:10px;background:rgba(180,0,0,0.92);color:#fff;padding:10px 14px;font:12px monospace;white-space:pre-wrap;display:none;z-index:99;border-radius:8px;max-height:60vh;overflow:auto"></pre>
  <script>
    window.addEventListener('error', e => {
      const el = document.getElementById('err'); el.style.display = 'block';
      el.textContent = '[error] ' + (e.error?.stack || e.error?.message || e.message);
    });
    window.addEventListener('unhandledrejection', e => {
      const el = document.getElementById('err'); el.style.display = 'block';
      el.textContent = '[promise] ' + (e.reason?.stack || e.reason?.message || e.reason);
    });
  </script>

  <!-- Embedded PNG data URLs allow WebGL textures to work when opened via file:// -->
  <script src="img/fruits/Cut Fruit/textures-all.js"></script>

  <!-- Babel Standalone: compiles TSX in-browser so this file works via file:// double-click -->
  <script src="https://unpkg.com/@babel/standalone@7.24.7/babel.min.js"></script>

  <script type="text/babel" data-presets="react,typescript" data-type="module">
    /** @jsxRuntime classic */
    /** @jsx React.createElement */
    /** @jsxFrag React.Fragment */
    import * as React from 'react';
    const { useMemo, useState, useEffect, useRef, Suspense } = React;
    import { createRoot } from 'react-dom/client';
    import { Canvas, useThree, useFrame } from '@react-three/fiber';
    import { Environment, OrbitControls, Float, MeshTransmissionMaterial } from '@react-three/drei';
    import { Geometry, Base, Subtraction, Addition } from '@react-three/csg';
    import { RoundedBoxGeometry } from 'three-stdlib';
    import * as THREE from 'three';

    /* ══════════════════════════════════════════════
       Shared constants: box + cell positions (in the box's local coords)
       ══════════════════════════════════════════════ */

    const BOX_W = 2.8, BOX_H = 1.0, BOX_D = 1.8, WALL = 0.04;
    const HOLE_W = (BOX_W - 3 * WALL) / 2;
    const HOLE_D = (BOX_D - 3 * WALL) / 2;
    const LEFT_X  = -BOX_W / 2 + WALL + HOLE_W / 2;
    const RIGHT_X = -LEFT_X;
    const FRONT_Z = BOX_D / 2 - WALL - HOLE_D / 2;
    const BACK_Z  = -FRONT_Z;
    const CELL_Y  = 0.45;   // above the cavity floor so the apple plane sits INSIDE the compartment

    // 4 cells in local coords (parent group transforms them)
    const CELLS = [
      { x: LEFT_X,  y: CELL_Y, z: BACK_Z  },  // 0: back-left
      { x: RIGHT_X, y: CELL_Y, z: BACK_Z  },  // 1: back-right
      { x: LEFT_X,  y: CELL_Y, z: FRONT_Z },  // 2: front-left
      { x: RIGHT_X, y: CELL_Y, z: FRONT_Z },  // 3: front-right
    ];

    const CUT_FRUIT_TEXTURE_SRCS = window.CUT_FRUIT_TEXTURE_SRCS;
    const cutFruit = (src) => CUT_FRUIT_TEXTURE_SRCS[src];
    const FRUIT_ITEMS = [
      { name: 'ふじりんご', wholeSrc: 'img/fruits/Whole Fruit/Apple/Red.png', cutSrc: cutFruit('Apple/Red.png') },
      { name: '王林りんご', wholeSrc: 'img/fruits/Whole Fruit/Apple/Green.png', cutSrc: cutFruit('Apple/Green.png') },
      { name: 'シナノゴールド', wholeSrc: 'img/fruits/Whole Fruit/Apple/Yellow.png', cutSrc: cutFruit('Apple/Yellow.png') },
      { name: '白桃', wholeSrc: 'img/fruits/Whole Fruit/Peach/Light.png', cutSrc: cutFruit('Peach/Light.png'), boxStyle: 'peach' },
      { name: 'あかつき桃', wholeSrc: 'img/fruits/Whole Fruit/Peach/Pink.png', cutSrc: cutFruit('Peach/Pink.png'), boxStyle: 'peach' },
      { name: '黄金桃', wholeSrc: 'img/fruits/Whole Fruit/Peach/Yellow.png', cutSrc: cutFruit('Peach/Yellow.png'), boxStyle: 'peach' },
      { name: '淡雪', wholeSrc: 'img/fruits/Whole Fruit/Strawberry/White.png', cutSrc: cutFruit('Strawberry/White.png') },
      { name: 'とちおとめ', wholeSrc: 'img/fruits/Whole Fruit/Strawberry/Red.png', cutSrc: cutFruit('Strawberry/Red.png') },
      { name: 'あまおう', wholeSrc: 'img/fruits/Whole Fruit/Strawberry/Dark.png', cutSrc: cutFruit('Strawberry/Dark.png') },
      { name: 'ラ・フランス', wholeSrc: 'img/fruits/Whole Fruit/Pear/LaFrance.png', cutSrc: cutFruit('Pear/La France.png') },
      { name: '幸水梨', wholeSrc: 'img/fruits/Whole Fruit/Pear/Kousui.png', cutSrc: cutFruit('Pear/Kousui.png') },
      { name: 'せとか', wholeSrc: 'img/fruits/Whole Fruit/Orange/Setoka.png', cutSrc: cutFruit('Orange/Setoka.png') },
      { name: '巨峰', wholeSrc: 'img/fruits/Whole Fruit/Grape/Kyoho.png', cutSrc: cutFruit('Grape/Kyoho.png'), boxStyle: 'cherryGrape' },
      { name: 'マスカット', wholeSrc: 'img/fruits/Whole Fruit/Grape/Muscat.png', cutSrc: cutFruit('Grape/Muscat.png'), boxStyle: 'cherryGrape' },
      { name: 'グリーンキウイ', wholeSrc: 'img/fruits/Whole Fruit/Kiwi/Green.png', cutSrc: cutFruit('Kiwi/Green.png') },
      { name: 'レッドキウイ', wholeSrc: 'img/fruits/Whole Fruit/Kiwi/Red.png', cutSrc: cutFruit('Kiwi/Red.png') },
      { name: 'ゴールドキウイ', wholeSrc: 'img/fruits/Whole Fruit/Kiwi/Yellow.png', cutSrc: cutFruit('Kiwi/Yellow.png') },
      { name: 'インドマンゴー', wholeSrc: 'img/fruits/Whole Fruit/Mango/Indo.png', cutSrc: cutFruit('Mango/Indo.png'), boxStyle: 'mango' },
      { name: 'アーウィンマンゴー', wholeSrc: 'img/fruits/Whole Fruit/Mango/Irwin.png', cutSrc: cutFruit('Mango/Irwin.png'), boxStyle: 'mango' },
      { name: '紅秀峰', wholeSrc: 'img/fruits/Whole Fruit/Cherry/Beni.png', cutSrc: cutFruit('Cherry/Beni.png'), boxStyle: 'cherryGrape' },
      { name: 'アメリカンチェリー', wholeSrc: 'img/fruits/Whole Fruit/Cherry/American.png', cutSrc: cutFruit('Cherry/American.png'), boxStyle: 'cherryGrape' },
      { name: 'スイカ', wholeSrc: 'img/fruits/Whole Fruit/Watermelon/Red.png', cutSrc: cutFruit('Watermelon/Red.png') },
      { name: '黄スイカ', wholeSrc: 'img/fruits/Whole Fruit/Watermelon/Yellow.png', cutSrc: cutFruit('Watermelon/Yellow.png') },
    ];
    const FRUITS_PER_PAGE = 10;

    function useAppleTexture(src) {
      const texture = useMemo(() => {
        const loaded = new THREE.TextureLoader().load(src);
        loaded.colorSpace = THREE.SRGBColorSpace;
        loaded.minFilter = THREE.LinearFilter;
        loaded.magFilter = THREE.LinearFilter;
        loaded.generateMipmaps = false;
        return loaded;
      }, [src]);

      useEffect(() => () => texture.dispose(), [texture]);
      return texture;
    }

    /* 每片水果都是独立的无光照平面，并继承盒子的旋转。
       固定绘制顺序只控制水果之间的遮挡，不影响盒子对水果的遮挡。 */
    function Apple3D({ appleId, cellIndex }) {
      const cell = CELLS[cellIndex];
      const fruit = FRUIT_ITEMS[appleId];
      const texture = useAppleTexture(fruit.cutSrc);
      // 左侧格子整体向左校正，右侧格子整体向右校正，让内容在各自格子中居中。
      const cellCenterShift = cell.x < 0 ? -0.04 : 0.04;

      const defaultStyle = {
        planeTilt: -1.05,
        planeSize: 0.6,
        columnDepthStep: 0.008,
        columns: [-0.32, -0.19, 0.1, 0.23],
        rotations: [-0.045, -0.018, 0.018, 0.045, -0.04, -0.012, 0.02, 0.05],
        rows: [
          // 屏幕上排：xShift 越小越靠左；z 越小越靠盒子深处。
          { y: 0.02, z: -0.12, xShift: -0.04 },
          // 屏幕下排：xShift 越大越靠右；z 越大越靠盒子开口，并遮住上排。
          { y: 0.07, z: 0.13, xShift: 0.10 },
        ],
      };

      /* ===== 桃子放进盒子后的样式：只调桃子就改这里 =====
         planeSize：桃子切片整体大小，数值越大整体越大。
         rows[0].y / rows[1].y：两排的上下位置；两个数差距越大，上下两排间距越宽。
         rows[0].z / rows[1].z：两排在盒子里的前后深度；差距越大，遮挡层次和透视分离越明显。
         rows[*].xShift：单独调整某一排左右位置，避免碰到小格子边缘。
      */
      const peachStyle = {
        planeTilt: -1.05,
        planeSize: 0.72,
        columnDepthStep: 0.008,
        columns: [-0.34, -0.18, 0.08, 0.24],
        rotations: [-0.045, -0.018, 0.018, 0.045, -0.04, -0.012, 0.02, 0.05],
        rows: [
          { y: -0.02, z: -0.17, xShift: 0.00 },
          { y: 0.10, z: 0.18, xShift: 0.09 },
        ],
      };

      /* ===== 樱桃和葡萄放进盒子后的样式：只调樱桃/葡萄就改这里 =====
         planeSize：每个切片的大小，数值越大每片越大。
         columns：一排 6 片的位置；每两个数字靠近就是一组，两组之间拉开就是组间距。
         rows：一共三排。y 调上下位置，z 调盒子前后深度，xShift 调整整排左右位置。
      */
      const cherryGrapeStyle = {
        planeTilt: -1.05,
        planeSize: 0.34,
        layoutPitchRotation: Math.PI / 12, // 樱桃/葡萄整组往前转角度：Math.PI / 9 约等于 20 度
        columnDepthStep: 0.006,
        columns: [-0.46, -0.31, -0.10, 0.05, 0.26, 0.41],
        rotations: [
          -0.05, -0.025, -0.012, 0.012, 0.025, 0.05,
          -0.045, -0.02, -0.008, 0.014, 0.03, 0.055,
          -0.04, -0.018, 0.0, 0.018, 0.036, 0.06,
        ],
        rows: [
          { y: -0.08, z: -0.22, xShift: -0.01 },
          { y: 0.00, z: 0.00, xShift: 0.02 },
          { y: 0.08, z: 0.22, xShift: 0.05 },
        ],
      };

      /* ===== 芒果放进盒子后的样式：只调芒果就改这里 =====
         planeSize：每个芒果切片大小。
         columns：一排 3 片的位置；数值越小越靠左，越大越靠右。
         rows：一共两排。y 调上下位置，z 调前后深度，xShift 调整整排左右位置。
      */
      const mangoStyle = {
        planeTilt: -1.05,
        planeSize: 0.58,
        columnDepthStep: 0.01,
        columns: [-0.30, 0.00, 0.30],
        rotations: [-0.04, 0.00, 0.04, -0.03, 0.01, 0.05],
        rows: [
          { y: -0.07, z: -0.10, xShift: -0.02 },
          { y: 0.05, z: 0.12, xShift: 0.04 },
        ],
      };

      const style = fruit.boxStyle === 'peach'
        ? peachStyle
        : fruit.boxStyle === 'cherryGrape'
          ? cherryGrapeStyle
          : fruit.boxStyle === 'mango'
            ? mangoStyle
            : defaultStyle;
      const columnCount = style.columns.length;
      const rawPieces = style.rows.flatMap((row, rowIndex) =>
        style.columns.map((x, columnIndex) => ({
          x: x + row.xShift,
          y: row.y,
          // 每片增加少量真实前后间距来产生视差，renderOrder 固定重叠顺序。
          z: row.z + (columnCount - 1 - columnIndex) * style.columnDepthStep,
          rotation: style.rotations[rowIndex * columnCount + columnIndex] ?? 0,
          layer: rowIndex * columnCount + (columnCount - 1 - columnIndex),
        }))
      );
      const layoutPitchRotation = style.layoutPitchRotation ?? 0;
      const pitchCos = Math.cos(layoutPitchRotation);
      const pitchSin = Math.sin(layoutPitchRotation);
      const centerY = rawPieces.reduce((sum, piece) => sum + piece.y, 0) / rawPieces.length;
      const centerZ = rawPieces.reduce((sum, piece) => sum + piece.z, 0) / rawPieces.length;
      const pieces = rawPieces.map((piece) => {
        const dy = piece.y - centerY;
        const dz = piece.z - centerZ;
        return {
          ...piece,
          y: centerY + dy * pitchCos - dz * pitchSin,
          z: centerZ + dy * pitchSin + dz * pitchCos,
          planeTilt: style.planeTilt + layoutPitchRotation,
        };
      });

      return (
        <group>
          {pieces.map((piece, index) => (
            <mesh
              key={index}
              position={[
                cell.x + cellCenterShift + piece.x,
                cell.y - 0.08 + piece.y,
                cell.z + piece.z,
              ]}
              rotation={[piece.planeTilt ?? style.planeTilt, 0, piece.rotation]}
              renderOrder={20 + piece.layer}
            >
              <planeGeometry args={[style.planeSize, style.planeSize]} />
              <meshBasicMaterial
                map={texture}
                transparent={false}
                alphaTest={0.5}
                depthTest
                depthWrite
                polygonOffset
                polygonOffsetFactor={-(piece.layer + 1) * 2}
                polygonOffsetUnits={-(piece.layer + 1) * 8}
                side={THREE.DoubleSide}
                toneMapped={false}
              />
            </mesh>
          ))}
        </group>
      );
    }

    /* A camera-facing 3D control: visually flat like HTML, but participates in
       WebGL depth and transmission so the compartment can pass in front of it. */
    function CloseButton3D({ position, onRemove }) {
      const texture = useMemo(() => {
        const canvas = document.createElement('canvas');
        canvas.width = 256;
        canvas.height = 256;
        const ctx = canvas.getContext('2d');

        ctx.clearRect(0, 0, 256, 256);
        ctx.shadowColor = 'rgba(0, 0, 0, 0.16)';
        ctx.shadowBlur = 14;
        ctx.shadowOffsetY = 5;
        ctx.beginPath();
        ctx.arc(128, 128, 80, 0, Math.PI * 2);
        ctx.fillStyle = '#ffffff';
        ctx.fill();

        ctx.shadowColor = 'transparent';
        ctx.strokeStyle = '#111111';
        ctx.lineWidth = 14;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(101, 101);
        ctx.lineTo(155, 155);
        ctx.moveTo(155, 101);
        ctx.lineTo(101, 155);
        ctx.stroke();

        const map = new THREE.CanvasTexture(canvas);
        map.colorSpace = THREE.SRGBColorSpace;
        map.minFilter = THREE.LinearFilter;
        map.magFilter = THREE.LinearFilter;
        map.generateMipmaps = false;
        map.needsUpdate = true;
        return map;
      }, []);

      useEffect(() => () => texture.dispose(), [texture]);

      return (
        <sprite
          position={position}
          scale={[0.14, 0.14, 1]}
          onClick={(e) => { e.stopPropagation(); onRemove(); }}
          onPointerOver={(e) => {
            e.stopPropagation();
            document.body.style.cursor = 'pointer';
          }}
          onPointerOut={() => { document.body.style.cursor = 'default'; }}
        >
          <spriteMaterial
            map={texture}
            transparent={false}
            alphaTest={0.1}
            depthTest
            depthWrite
            toneMapped={false}
          />
        </sprite>
      );
    }

    /* Keep the reference app's screen-quadrant drop model, but derive its bounds
       from this file's larger, lower box instead of assuming a 600x500 box. */
    function BoxScreenTracker({ groupRef, screenRef }) {
      useFrame(({ camera, size }) => {
        if (!groupRef.current) return;
        const toScreen = (worldPos) => {
          const clip = worldPos.clone().project(camera);
          // setViewOffset is already baked into Three.js's projection matrix.
          return {
            x: (clip.x + 1) / 2 * size.width,
            y: (-clip.y + 1) / 2 * size.height,
          };
        };

        groupRef.current.updateWorldMatrix(true, false);

        const projectedCells = CELLS.map((cell) => {
          const cellWorld = new THREE.Vector3(cell.x, cell.y, cell.z);
          groupRef.current.localToWorld(cellWorld);
          return toScreen(cellWorld);
        });

        const outerCorners = [];
        for (const x of [-BOX_W / 2 - 0.08, BOX_W / 2 + 0.08]) {
          for (const y of [-BOX_H / 2, BOX_H / 2 + 0.08]) {
            for (const z of [-BOX_D / 2 - 0.08, BOX_D / 2 + 0.08]) {
              const corner = new THREE.Vector3(x, y, z);
              groupRef.current.localToWorld(corner);
              outerCorners.push(toScreen(corner));
            }
          }
        }

        const xs = outerCorners.map(point => point.x);
        const ys = outerCorners.map(point => point.y);
        screenRef.current = {
          centerX: projectedCells.reduce((sum, cell) => sum + cell.x, 0) / 4,
          centerY: projectedCells.reduce((sum, cell) => sum + cell.y, 0) / 4,
          minX: Math.min(...xs),
          maxX: Math.max(...xs),
          minY: Math.min(...ys),
          maxY: Math.max(...ys),
        };
      });
      return null;
    }

    /* ══════════════════════════════════════════════
       GlassCube — copied verbatim from the reference folder
       ══════════════════════════════════════════════ */

    function useTaperedBox(width, height, depth, radius, topScale, yOffset, xOffset, zOffset) {
      return useMemo(() => {
        const g = new RoundedBoxGeometry(width, height, depth, 4, radius);
        const pos = g.attributes.position;
        for (let i = 0; i < pos.count; i++) {
          const localY = pos.getY(i);
          const absoluteY = localY + yOffset;
          const normalizedY = absoluteY + 0.5;
          const scale = 1 + normalizedY * (topScale - 1);

          const localX = pos.getX(i);
          const absoluteX = localX + xOffset;
          pos.setX(i, absoluteX * scale - xOffset);

          const localZ = pos.getZ(i);
          const absoluteZ = localZ + zOffset;
          pos.setZ(i, absoluteZ * scale - zOffset);
        }
        g.computeVertexNormals();
        return g;
      }, [width, height, depth, radius, topScale, yOffset, xOffset, zOffset]);
    }

    function GlassCube({ transmission, roughness, ior, rotationX, glassColor, attenuationColor, envMapIntensity }) {
      const taperScale = 1.05;
      const boxW = 2.8, boxH = 1.0, boxD = 1.8;
      const rad = 0.15, wall = 0.04;
      const holeW = (boxW - 3 * wall) / 2;
      const holeD = (boxD - 3 * wall) / 2;
      const holeH = 1.0;
      const innerRad = 0.1;
      const leftX  = -boxW / 2 + wall + holeW / 2;
      const rightX = -leftX;
      const frontZ = boxD / 2 - wall - holeD / 2;
      const backZ  = -frontZ;

      const baseGeom = useTaperedBox(boxW, boxH, boxD, rad, taperScale, 0, 0, 0);
      const rimGeom  = useTaperedBox(boxW + 0.15, 0.08, boxD + 0.15, rad, taperScale, 0.46, 0, 0);
      const holeGeom1 = useTaperedBox(holeW, holeH, holeD, innerRad, taperScale, 0.15, leftX,  backZ);
      const holeGeom2 = useTaperedBox(holeW, holeH, holeD, innerRad, taperScale, 0.15, rightX, backZ);
      const holeGeom3 = useTaperedBox(holeW, holeH, holeD, innerRad, taperScale, 0.15, leftX,  frontZ);
      const holeGeom4 = useTaperedBox(holeW, holeH, holeD, innerRad, taperScale, 0.15, rightX, frontZ);

      return (
        <mesh position={[0, 0, 0]}>
          <Geometry computeVertexNormals>
            <Base>
              <primitive object={baseGeom} attach="geometry" />
            </Base>
            <Addition position={[0, 0.46, 0]}>
              <primitive object={rimGeom} attach="geometry" />
            </Addition>
            <Subtraction position={[leftX,  0.15, backZ]}>
              <primitive object={holeGeom1} attach="geometry" />
            </Subtraction>
            <Subtraction position={[rightX, 0.15, backZ]}>
              <primitive object={holeGeom2} attach="geometry" />
            </Subtraction>
            <Subtraction position={[leftX,  0.15, frontZ]}>
              <primitive object={holeGeom3} attach="geometry" />
            </Subtraction>
            <Subtraction position={[rightX, 0.15, frontZ]}>
              <primitive object={holeGeom4} attach="geometry" />
            </Subtraction>
          </Geometry>
          <MeshTransmissionMaterial
            /* ===== 玻璃高级参数：一般先调整 App() 中的基础设置 ===== */
            backside
            /* 玻璃背面厚度：越大，边缘折射越明显。 */
            backsideThickness={3.0}
            /* 玻璃厚度：越大，折射和颜色吸收越明显。 */
            thickness={2.1}
            /* 彩色色散强度：0 为无彩边，数值越大彩边越明显。 */
            chromaticAberration={0.02}
            /* 各向异性模糊：越大，玻璃内的影像越柔和。 */
            anisotropicBlur={0.2}
            roughness={roughness}
            ior={ior}
            /* 清漆高光：clearcoat 控制强度，clearcoatRoughness 控制高光模糊。 */
            clearcoat={1}
            clearcoatRoughness={0.1}
            color={glassColor}
            attenuationColor={attenuationColor}
            /* 颜色吸收距离：越小，attenuationColor 的染色越明显。 */
            attenuationDistance={3.8}
            transmission={transmission * 0.90}
            /* opacity 保持 1；透明感主要通过 transmission 调整。 */
            transparent
            opacity={1}
            /* 玻璃扭曲：distortion 控制强度，distortionScale 控制扭曲尺度。 */
            distortion={0.3}
            distortionScale={0.4}
            /* 折射缓冲精度：越高越清晰，但性能消耗越大。 */
            resolution={1024}
            envMapIntensity={envMapIntensity}
          />
        </mesh>
      );
    }

    /* ══════════════════════════════════════════════
       AutoReturn — when the user releases the mouse after orbiting, smoothly
       ease the camera back to its initial position. Uses lerp with a low
       coefficient so the motion feels weighted rather than snappy.
       ══════════════════════════════════════════════ */

    function AutoReturn({ initialAzimuth = 0, initialPolar = Math.atan2(8, 3), easeSpeed = 0.06 }) {
      const controls = useThree(state => state.controls);
      const draggingRef = useRef(false);

      useEffect(() => {
        if (!controls) return;
        const onStart = () => { draggingRef.current = true; };
        const onEnd   = () => { draggingRef.current = false; };
        controls.addEventListener('start', onStart);
        controls.addEventListener('end',   onEnd);
        return () => {
          controls.removeEventListener('start', onStart);
          controls.removeEventListener('end',   onEnd);
        };
      }, [controls]);

      useFrame(() => {
        if (!controls || draggingRef.current) return;
        // Lerp only ANGLES (azimuth + polar) — keep distance constant so the
        // camera doesn't dolly in/out along a straight-line path.
        const curAz = controls.getAzimuthalAngle();
        const curPo = controls.getPolarAngle();
        const dAz = initialAzimuth - curAz;
        const dPo = initialPolar   - curPo;
        if (Math.abs(dAz) < 0.001 && Math.abs(dPo) < 0.001) return;
        controls.setAzimuthalAngle(curAz + dAz * easeSpeed);
        controls.setPolarAngle(    curPo + dPo * easeSpeed);
        controls.update();
      });
      return null;
    }

    /* ══════════════════════════════════════════════
       ViewOffset — shifts the rendered viewport DOWN so the box (which sits
       exactly at the OrbitControls target) appears in the lower part of the
       frame. Rotation still pivots around the box itself.
       ══════════════════════════════════════════════ */

    function ViewOffset({ shift = 0.2 }) {
      const { camera, size } = useThree();
      useEffect(() => {
        if (typeof camera.setViewOffset !== 'function') return;
        camera.setViewOffset(
          size.width,
          size.height * (1 + shift),
          0,
          -size.height * shift,
          size.width,
          size.height,
        );
        return () => camera.clearViewOffset();
      }, [camera, size.width, size.height, shift]);
      return null;
    }

    /* ══════════════════════════════════════════════
       App：页面和 3D 盒子的主要设置
       ══════════════════════════════════════════════ */

    function App() {
      /* ===== 盒子玻璃设置：平时主要修改这里 ===== */
      const rotationX        = 0.7;       // 盒子默认前倾角度；数值越大，俯视角度越明显
      const transmission     = 0.85;      // 玻璃透明感：0 = 不透明，1 = 最通透
      const roughness        = 0.22;      // 玻璃磨砂程度：0 = 光滑清晰，1 = 模糊磨砂
      const ior              = 1.0;       // 折射率：常用约 1.0-2.5，越大折射变形越明显
      const glassColor       = '#ffffff'; // 盒子玻璃的主体颜色
      const attenuationColor = '#e0f3ff'; // 玻璃内部吸收颜色，会影响厚处和边缘色调
      const envMapIntensity  = 4.0;       // 环境反射亮度：越大，高光和反射越明显
      const lightIntensity   = 5.5;       // 场景灯光亮度：同时影响盒子的整体明暗
      const rotateLeftRightLimit = Math.PI / 5.0; // 左右旋转限制：数值越小，左右可转动范围越小
      const rotateUpLimit        = Math.PI / 9.5; // 往上旋转限制：数值越小，往上可转动范围越小
      const rotateDownLimit      = Math.PI / 5.0; // 往下旋转限制：数值越小，往下可转动范围越小
      const defaultPolarAngle    = Math.atan2(8, 3); // 上下旋转的默认中心角度，通常不用改

      const [placedFruits, setPlacedFruits] = useState([]);
      const [dragClone, setDragClone] = useState(null);
      const fruitSlotWidth = 126; // 顶部水果栏单格间距：水果宽 92 + 空隙 34；也用于计算滚动位置。
      const getFruitSlots = () => Math.max(3, Math.min(FRUITS_PER_PAGE, Math.floor((window.innerWidth - 180) / 126)));
      const [fruitSlots, setFruitSlots] = useState(getFruitSlots);
      const [fruitOffset, setFruitOffset] = useState(0);
      const [fruitDragDelta, setFruitDragDelta] = useState(0);
      const [fruitStripDragging, setFruitStripDragging] = useState(false);
      const [fruitSnapDuration, setFruitSnapDuration] = useState(420);
      const [fruitEdgePull, setFruitEdgePull] = useState({ left: 0, right: 0 });
      const maxFruitOffset = Math.max(0, FRUIT_ITEMS.length - fruitSlots);
      const fruitViewportWidth = fruitSlots * fruitSlotWidth - 34;
      const fruitStripTranslate = -fruitOffset * fruitSlotWidth + fruitDragDelta;
      const liveFruitOffset = Math.max(0, Math.min(maxFruitOffset, -fruitStripTranslate / fruitSlotWidth));
      const canScrollPrev = liveFruitOffset > 0.03;
      const canScrollNext = liveFruitOffset < maxFruitOffset - 0.03;
      const fruitContentWidth = FRUIT_ITEMS.length * fruitSlotWidth - 34;
      const scrollbarTrackWidth = fruitViewportWidth;
      const scrollbarThumbWidth = maxFruitOffset > 0
        ? Math.max(38, scrollbarTrackWidth * fruitViewportWidth / fruitContentWidth)
        : scrollbarTrackWidth;
      const scrollbarThumbX = maxFruitOffset > 0
        ? (scrollbarTrackWidth - scrollbarThumbWidth) * (liveFruitOffset / maxFruitOffset)
        : 0;

      // Reference-style screen bounds and quadrant center for the current box transform
      const boxScreenRef = useRef(null);
      const groupRef     = useRef(null);
      const nextPlacedIdRef = useRef(0);
      const draggingAppleIdRef = useRef(null);
      const dragOffsetRef = useRef({ x: 0, y: 0 });
      const dragStartRef = useRef({ x: 0, y: 0 });
      const didDragRef = useRef(false);
      const fruitStripDragRef = useRef({ active: false, startX: 0, startOffset: 0 });
      const fruitDragDeltaRef = useRef(0);
      const fruitVelocityRef = useRef({ x: 0, lastDelta: 0, lastTime: 0 });
      const fruitOffsetRef = useRef(fruitOffset);
      const maxFruitOffsetRef = useRef(maxFruitOffset);
      const pendingAppleGestureRef = useRef(null);
      fruitOffsetRef.current = fruitOffset;
      maxFruitOffsetRef.current = maxFruitOffset;

      const placeAppleInCell = (prev, appleId, cell) => [
        ...prev.filter(a => a.cell !== cell),
        { id: nextPlacedIdRef.current++, appleId, cell },
      ];

      const beginFruitStripDrag = (startX, startOffset, timeStamp) => {
        fruitStripDragRef.current = { active: true, startX, startOffset };
        fruitDragDeltaRef.current = 0;
        fruitVelocityRef.current = { x: 0, lastDelta: 0, lastTime: timeStamp || performance.now() };
        setFruitStripDragging(true);
        setFruitSnapDuration(0);
        setFruitDragDelta(0);
        setFruitEdgePull({ left: 0, right: 0 });
      };

      const updateFruitStripDrag = (e) => {
        const drag = fruitStripDragRef.current;
        if (!drag.active) return;

        const rawTranslate = -drag.startOffset * fruitSlotWidth + (e.clientX - drag.startX);
        const minTranslate = -maxFruitOffsetRef.current * fruitSlotWidth;
        const edgePullLimit = 46; // 到头后还能被拉出的最大距离；数值越大，边界弹性越明显。
        const edgeResistance = 0.24; // 到头后的阻尼：数值越小，越难继续拉动。
        let resistedTranslate = rawTranslate;
        if (rawTranslate > 0) {
          resistedTranslate = Math.min(edgePullLimit, rawTranslate * edgeResistance);
        } else if (rawTranslate < minTranslate) {
          resistedTranslate = minTranslate - Math.min(edgePullLimit, (minTranslate - rawTranslate) * edgeResistance);
        }
        const nextDelta = resistedTranslate + drag.startOffset * fruitSlotWidth;
        setFruitEdgePull({
          left: Math.max(0, resistedTranslate),
          right: Math.max(0, minTranslate - resistedTranslate),
        });
        const now = e.timeStamp || performance.now();
        const velocity = fruitVelocityRef.current;
        const dt = Math.max(1, now - velocity.lastTime);
        const instantVelocity = (nextDelta - velocity.lastDelta) / dt;
        fruitVelocityRef.current = {
          x: velocity.x * 0.35 + instantVelocity * 0.65,
          lastDelta: nextDelta,
          lastTime: now,
        };
        fruitDragDeltaRef.current = nextDelta;
        setFruitDragDelta(nextDelta);
      };

      const finishFruitStripDrag = (e) => {
        const drag = fruitStripDragRef.current;
        if (!drag.active) return;

        const velocity = fruitVelocityRef.current;
        const releaseTime = e?.timeStamp || performance.now();
        const releaseVelocity = releaseTime - velocity.lastTime < 140 ? velocity.x : 0;
        const currentDelta = fruitDragDeltaRef.current;
        const currentOffset = Math.max(
          0,
          Math.min(maxFruitOffsetRef.current, drag.startOffset - currentDelta / fruitSlotWidth)
        );
        const momentumDelta = releaseVelocity * 240; // 惯性距离：数值越大，快速松手后继续滑动越远。
        const maxMomentumSlots = 3; // 只限制松手后额外滑行的格数，不限制用户已经手动拖过的距离。
        const momentumSlots = Math.max(
          -maxMomentumSlots,
          Math.min(maxMomentumSlots, -momentumDelta / fruitSlotWidth)
        );
        const freeOffset = Math.max(
          0,
          Math.min(maxFruitOffsetRef.current, currentOffset + momentumSlots)
        );
        const nearestSlot = Math.round(freeOffset);
        const weakSnapPx = 4; // 极弱吸附：只有已经很接近格子中心时才对齐；设为 0 可完全关闭。
        const shouldWeakSnap = Math.abs(nearestSlot - freeOffset) * fruitSlotWidth <= weakSnapPx;
        const finalOffset = shouldWeakSnap
          ? Math.max(0, Math.min(maxFruitOffsetRef.current, nearestSlot))
          : freeOffset;
        const movedSlots = Math.abs(finalOffset - currentOffset);
        setFruitSnapDuration(Math.min(520, 260 + movedSlots * 42));
        fruitStripDragRef.current = { active: false, startX: 0, startOffset: finalOffset };
        fruitDragDeltaRef.current = 0;
        fruitVelocityRef.current = { x: 0, lastDelta: 0, lastTime: 0 };
        setFruitOffset(finalOffset);
        setFruitDragDelta(0);
        setFruitStripDragging(false);
        setFruitEdgePull({ left: 0, right: 0 });
      };

      // 顶部水果先判断拖拽方向：横向拖动滚动列表，纵向拖动才生成水果分身。
      const onApplePointerDown = (e, appleId) => {
        const rect = e.currentTarget.getBoundingClientRect();
        pendingAppleGestureRef.current = {
          active: true,
          appleId,
          rect,
          startX: e.clientX,
          startY: e.clientY,
          startOffset: fruitOffsetRef.current,
          startTime: e.timeStamp || performance.now(),
        };
        didDragRef.current = false;
        e.currentTarget.setPointerCapture(e.pointerId);
        e.stopPropagation();
      };
      const onWindowMove = (e) => {
        const pendingGesture = pendingAppleGestureRef.current;
        if (pendingGesture?.active) {
          const dx = e.clientX - pendingGesture.startX;
          const dy = e.clientY - pendingGesture.startY;
          if (Math.hypot(dx, dy) < 6) return;

          didDragRef.current = true;
          pendingAppleGestureRef.current = null;
          // 方向判定：只有接近水平的约 20 度范围算滚动列表，其余斜向下更容易按拖水果处理。
          if (Math.abs(dx) > Math.abs(dy) * 2.75) {
            beginFruitStripDrag(pendingGesture.startX, pendingGesture.startOffset, pendingGesture.startTime);
            updateFruitStripDrag(e);
            return;
          }

          draggingAppleIdRef.current = pendingGesture.appleId;
          dragOffsetRef.current = {
            x: pendingGesture.startX - pendingGesture.rect.left,
            y: pendingGesture.startY - pendingGesture.rect.top,
          };
          dragStartRef.current = { x: pendingGesture.startX, y: pendingGesture.startY };
          setDragClone({
            appleId: pendingGesture.appleId,
            x: pendingGesture.rect.left,
            y: pendingGesture.rect.top,
          });
        }

        if (fruitStripDragRef.current.active) {
          updateFruitStripDrag(e);
          return;
        }

        const appleId = draggingAppleIdRef.current;
        if (appleId == null) return;
        const nx = e.clientX - dragOffsetRef.current.x;
        const ny = e.clientY - dragOffsetRef.current.y;
        const dx = e.clientX - dragStartRef.current.x;
        const dy = e.clientY - dragStartRef.current.y;
        if (Math.hypot(dx, dy) > 6) didDragRef.current = true;
        setDragClone(prev => prev ? { ...prev, x: nx, y: ny } : prev);
      };
      const onWindowUp = (e) => {
        if (pendingAppleGestureRef.current?.active) {
          pendingAppleGestureRef.current = null;
        }

        if (fruitStripDragRef.current.active) {
          finishFruitStripDrag(e);
          return;
        }

        const appleId = draggingAppleIdRef.current;
        draggingAppleIdRef.current = null;
        setDragClone(null);
        if (appleId == null) return;
        setPlacedFruits(prev => {
          const box = boxScreenRef.current;
          if (!box) return prev;

          // motion/react's PanInfo uses the release pointer, not the dragged
          // element center. Matching that detail makes edge drops feel precise.
          const dropX = e.clientX;
          const dropY = e.clientY;
          const padding = 36;
          if (
            dropX < box.minX - padding || dropX > box.maxX + padding ||
            dropY < box.minY - padding || dropY > box.maxY + padding
          ) return prev;

          const isRight = dropX > box.centerX;
          const isBottom = dropY > box.centerY;
          let compIdx = 0;
          if (isRight && !isBottom) compIdx = 1;
          if (!isRight && isBottom) compIdx = 2;
          if (isRight && isBottom) compIdx = 3;
          return placeAppleInCell(prev, appleId, compIdx);
        });
      };

      // 单击水果时，按 左上 -> 右上 -> 左下 -> 右下 的顺序放进第一个空格。
      const onAppleClick = (appleId) => {
        if (didDragRef.current) {
          didDragRef.current = false;
          return;
        }
        setPlacedFruits(prev => {
          const firstEmptyCell = [0, 1, 2, 3].find(cell => !prev.some(a => a.cell === cell));
          return firstEmptyCell == null ? prev : placeAppleInCell(prev, appleId, firstEmptyCell);
        });
      };

      useEffect(() => {
        window.addEventListener('pointermove', onWindowMove);
        window.addEventListener('pointerup', onWindowUp);
        window.addEventListener('pointercancel', onWindowUp);
        return () => {
          window.removeEventListener('pointermove', onWindowMove);
          window.removeEventListener('pointerup', onWindowUp);
          window.removeEventListener('pointercancel', onWindowUp);
        };
      }, []);

      useEffect(() => {
        const onResize = () => setFruitSlots(getFruitSlots());
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      useEffect(() => {
        setFruitOffset(offset => Math.min(offset, maxFruitOffset));
      }, [maxFruitOffset]);

      const unsnapApple = (id) => {
        setPlacedFruits(prev => prev.filter(a => a.id !== id));
      };

      const turnFruitPage = (direction) => {
        setFruitSnapDuration(460);
        setFruitOffset(offset => Math.max(0, Math.min(maxFruitOffset, offset + direction * fruitSlots)));
      };

      // 顶部水果栏拖动：松手后按速度继续滑动；只有离格子中心 4px 内才做极弱对齐。
      const onFruitStripPointerDown = (e) => {
        if (e.target.closest('button')) return;
        beginFruitStripDrag(e.clientX, fruitOffsetRef.current, e.timeStamp);
        e.currentTarget.setPointerCapture(e.pointerId);
        e.preventDefault();
      };

      const onFruitStripPointerMove = (e) => {
        updateFruitStripDrag(e);
      };

      const onFruitStripPointerUp = (e) => {
        finishFruitStripDrag(e);
      };

      return (
        <div style={{ width: '100vw', height: '100vh', overflow: 'hidden', background: '#F7F8FA', position: 'relative' }}>
          <Canvas camera={{ position: [0, 3, 8], fov: 45 }}>
            <ViewOffset shift={0.17} />
            <color attach="background" args={['#F7F8FA']} />
            <ambientLight intensity={lightIntensity * 0.25} />
            <directionalLight position={[10, 10, 5]} intensity={lightIntensity} castShadow />
            <spotLight position={[-10, 10, -10]} angle={0.3} penumbra={1} intensity={lightIntensity * 0.6} color="#e0eaff" />
            <Suspense fallback={null}>
              <Float speed={2} rotationIntensity={0} floatIntensity={0.5}>
                <group ref={groupRef} rotation={[rotationX, 0, 0]} scale={1.55}>
                  <GlassCube
                    transmission={transmission}
                    roughness={roughness}
                    ior={ior}
                    glassColor={glassColor}
                    attenuationColor={attenuationColor}
                    envMapIntensity={envMapIntensity}
                  />
                  {placedFruits.map(a => (
                    <group key={a.id}>
                      <Apple3D appleId={a.appleId} cellIndex={a.cell} />
                      <CloseButton3D
                        position={[
                          CELLS[a.cell].x + 0.56,
                          CELLS[a.cell].y + 0.08,
                          CELLS[a.cell].z - 0.32,
                        ]}
                        onRemove={() => unsnapApple(a.id)}
                      />
                    </group>
                  ))}
                </group>
              </Float>
              <BoxScreenTracker groupRef={groupRef} screenRef={boxScreenRef} />
              <AutoReturn easeSpeed={0.15} />
              <Environment preset="warehouse" />
            </Suspense>
            <OrbitControls
              enablePan={false}
              enableZoom={false}
              minAzimuthAngle={-rotateLeftRightLimit}
              maxAzimuthAngle={rotateLeftRightLimit}
              minPolarAngle={defaultPolarAngle - rotateUpLimit}
              maxPolarAngle={defaultPolarAngle + rotateDownLimit}
              target={[0, 0, 0]}
              makeDefault
            />
          </Canvas>

          <header
            style={{
              position: 'absolute',
              left: 0,
              top: 0,
              width: '100%',
              height: 76,
              background: '#ffffff',
              zIndex: 20,
              display: 'flex',
              alignItems: 'center',
              paddingLeft: 36,
              boxSizing: 'border-box',
            }}
          >
            <img
              src="img/icon/logo-yoko.svg"
              alt="果実 LABO"
              draggable={false}
              style={{ width: 178, height: 'auto', display: 'block', userSelect: 'none', WebkitUserDrag: 'none' }}
            />
          </header>

          <div
            onContextMenu={(e) => e.preventDefault()}
            style={{
              position: 'absolute',
              left: '50%',
              top: 104,
              transform: 'translateX(-50%)',
              display: 'flex',
              alignItems: 'flex-start',
              gap: 24,
              zIndex: 25,
              width: 'min(1580px, calc(100vw - 104px))',
              justifyContent: 'center',
              userSelect: 'none',
            }}
          >
            {canScrollPrev ? (
              <button
                type="button"
                onClick={() => turnFruitPage(-1)}
                onContextMenu={(e) => e.preventDefault()}
                style={{
                  width: 30,
                  height: 30,
                  marginTop: 22,
                  padding: 0,
                  border: 0,
                  borderRadius: '50%',
                  background: 'transparent',
                  display: 'grid',
                  placeItems: 'center',
                  cursor: 'pointer',
                  userSelect: 'none',
                }}
                aria-label="前の果物"
              >
                <img
                  src="img/icon/jiantou.svg"
                  draggable={false}
                  alt=""
                  style={{ width: 25, height: 25, display: 'block', pointerEvents: 'none', WebkitUserDrag: 'none' }}
                />
              </button>
            ) : (
              <div style={{ width: 30, height: 30, marginTop: 22 }} />
            )}

            <div
              onPointerDown={onFruitStripPointerDown}
              style={{
                width: fruitViewportWidth,
                overflow: 'hidden',
                position: 'relative',
                paddingBottom: 10, // 给水果名称和下方滚动条留出间距，避免文字压住滚动条。
                cursor: fruitStripDragging ? 'grabbing' : 'grab',
                touchAction: 'pan-y',
              }}
            >
              <div
                style={{
                  display: 'grid',
                  gridTemplateColumns: `repeat(${FRUIT_ITEMS.length}, 92px)`,
                  gap: 34,
                  transform: `translateX(${fruitStripTranslate}px)`,
                  transition: fruitStripDragging ? 'none' : `transform ${fruitSnapDuration}ms cubic-bezier(0.16, 1, 0.3, 1)`,
                  willChange: 'transform',
                  overflow: 'visible',
                }}
              >
                {FRUIT_ITEMS.map((fruit, id) => (
                  <button
                    key={fruit.name}
                    type="button"
                    onPointerDown={(e) => onApplePointerDown(e, id)}
                    onClick={() => onAppleClick(id)}
                    onContextMenu={(e) => e.preventDefault()}
                    style={{
                      width: 92,
                      padding: 0,
                      border: 0,
                      background: 'transparent',
                      display: 'flex',
                      flexDirection: 'column',
                      alignItems: 'center',
                      cursor: 'grab',
                      userSelect: 'none',
                      touchAction: 'none',
                      font: '12px/1.2 -apple-system, BlinkMacSystemFont, sans-serif',
                      color: '#111',
                    }}
                    aria-label={fruit.name}
                  >
                    <img
                      src={fruit.wholeSrc}
                      draggable={false}
                      onContextMenu={(e) => e.preventDefault()}
                      style={{
                        width: 68,
                        height: 68,
                        objectFit: 'contain',
                        pointerEvents: 'none',
                        WebkitUserDrag: 'none',
                      }}
                      alt=""
                    />
                    <span style={{ marginTop: 8, whiteSpace: 'nowrap' }}>{fruit.name}</span>
                  </button>
                ))}
              </div>
              <div
                style={{
                  position: 'absolute',
                  left: 0,
                  top: 16,
                  bottom: 40,
                  width: 3,
                  borderRadius: 999,
                  background: `rgba(0, 0, 0, ${Math.min(0.5, fruitEdgePull.left / 92)})`,
                  transform: `scaleY(${0.35 + Math.min(0.5, fruitEdgePull.left / 130)})`,
                  transformOrigin: 'center',
                  transition: fruitStripDragging ? 'none' : 'background 240ms ease, transform 240ms ease',
                  pointerEvents: 'none',
                }}
              />
              <div
                style={{
                  position: 'absolute',
                  right: 0,
                  top: 16,
                  bottom: 40,
                  width: 3,
                  borderRadius: 999,
                  background: `rgba(0, 0, 0, ${Math.min(0.5, fruitEdgePull.right / 92)})`,
                  transform: `scaleY(${0.35 + Math.min(0.5, fruitEdgePull.right / 130)})`,
                  transformOrigin: 'center',
                  transition: fruitStripDragging ? 'none' : 'background 240ms ease, transform 240ms ease',
                  pointerEvents: 'none',
                }}
              />
              <div
                style={{
                  position: 'absolute',
                  left: 0,
                  right: 0,
                  bottom: 0,
                  height: 2,
                  opacity: fruitStripDragging ? 1 : 0,
                  transition: 'opacity 220ms ease',
                  pointerEvents: 'none',
                }}
              >
                <div
                  style={{
                    width: scrollbarThumbWidth,
                    height: '100%',
                    borderRadius: 999,
                    background: 'rgba(0, 0, 0, 0.28)',
                    transform: `translateX(${scrollbarThumbX}px)`,
                    transition: fruitStripDragging ? 'none' : 'transform 220ms ease',
                  }}
                />
              </div>
            </div>

            {canScrollNext ? (
              <button
                type="button"
                onClick={() => turnFruitPage(1)}
                onContextMenu={(e) => e.preventDefault()}
                style={{
                  width: 30,
                  height: 30,
                  marginTop: 22,
                  padding: 0,
                  border: 0,
                  borderRadius: '50%',
                  background: 'transparent',
                  display: 'grid',
                  placeItems: 'center',
                  cursor: 'pointer',
                  userSelect: 'none',
                }}
                aria-label="次の果物"
              >
                <img
                  src="img/icon/jiantou.svg"
                  draggable={false}
                  alt=""
                  style={{
                    width: 25,
                    height: 25,
                    display: 'block',
                    pointerEvents: 'none',
                    WebkitUserDrag: 'none',
                    transform: 'scaleX(-1)',
                  }}
                />
              </button>
            ) : (
              <div style={{ width: 30, height: 30, marginTop: 22 }} />
            )}
          </div>

          {dragClone && (
            <img
              src={FRUIT_ITEMS[dragClone.appleId].wholeSrc}
              draggable={false}
              style={{
                position: 'absolute',
                left: dragClone.x,
                top: dragClone.y,
                width: 68,
                height: 68,
                objectFit: 'contain',
                pointerEvents: 'none',
                userSelect: 'none',
                WebkitUserDrag: 'none',
                zIndex: 50,
              }}
              alt=""
            />
          )}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
